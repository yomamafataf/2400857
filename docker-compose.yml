services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-password_lab}"
      POSTGRES_USER: "${POSTGRES_USER:-labapp}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-labapp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-password_lab}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  web:
    image: nginx:1.28-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
      - "127.0.0.1:${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/localhost.crt:/etc/nginx/tls/localhost.crt:ro
      - ./certs/localhost.key:/etc/nginx/tls/localhost.key:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  git-server:
    image: docker.gitea.com/gitea:latest-rootless
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /var/lib/gitea/data/gitea.db
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__server__DOMAIN: 127.0.0.1
      GITEA__server__ROOT_URL: "http://127.0.0.1:${GITEA_HTTP_PORT:-3001}/"
      GITEA__server__SSH_DOMAIN: 127.0.0.1
      GITEA__server__SSH_PORT: "${GITEA_SSH_PORT:-2222}"
      GITEA__server__START_SSH_SERVER: "true"
    ports:
      - "127.0.0.1:${GITEA_HTTP_PORT:-3001}:3000"
      - "127.0.0.1:${GITEA_SSH_PORT:-2222}:2222"
    volumes:
      - gitea-data:/var/lib/gitea
      - gitea-config:/etc/gitea
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
  gitea-data:
  gitea-config:
