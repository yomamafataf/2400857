services:
  auth-init:
    image: httpd:2.4-alpine
    environment:
      BASIC_AUTH_USERNAME: "${BASIC_AUTH_USERNAME:?Set BASIC_AUTH_USERNAME in .env}"
      BASIC_AUTH_PASSWORD: "${BASIC_AUTH_PASSWORD:?Set BASIC_AUTH_PASSWORD in .env}"
    command:
      - /bin/sh
      - -ec
      - /usr/local/apache2/bin/htpasswd -Bbc /auth/.htpasswd "$${BASIC_AUTH_USERNAME}" "$${BASIC_AUTH_PASSWORD}"
    volumes:
      - auth-data:/auth
    restart: "no"
    security_opt:
      - no-new-privileges:true

  web:
    image: nginx:1.28-alpine
    depends_on:
      auth-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
      - "127.0.0.1:${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - ./certs/localhost.crt:/etc/nginx/tls/localhost.crt:ro
      - ./certs/localhost.key:/etc/nginx/tls/localhost.key:ro
      - auth-data:/etc/nginx/auth:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  git-server:
    image: docker.gitea.com/gitea:latest-rootless
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /var/lib/gitea/data/gitea.db
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__server__DOMAIN: 127.0.0.1
      GITEA__server__ROOT_URL: "http://127.0.0.1:${GITEA_HTTP_PORT:-3001}/"
      GITEA__server__SSH_DOMAIN: 127.0.0.1
      GITEA__server__SSH_PORT: "${GITEA_SSH_PORT:-2222}"
      GITEA__server__START_SSH_SERVER: "true"
    ports:
      - "127.0.0.1:${GITEA_HTTP_PORT:-3001}:3000"
      - "127.0.0.1:${GITEA_SSH_PORT:-2222}:2222"
    volumes:
      - gitea-data:/var/lib/gitea
      - gitea-config:/etc/gitea
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  auth-data:
  gitea-data:
  gitea-config:
