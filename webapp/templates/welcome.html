{% extends "base.html" %}
{% block title %}Welcome{% endblock %}
{% block content %}
<h1>Welcome, {{ username }}</h1>
<p>Your accepted password is: <output>{{ password }}</output></p>
<p>The password was not stored.</p>
<form action="{{ url_for('logout') }}" method="post">
  <button type="submit">Log out</button>
</form>
{% endblock %}
